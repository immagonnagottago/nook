<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Crossroads MUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0c0a;
      --bg2:       #0f130f;
      --border:    #1a2e1a;
      --green:     #39ff14;
      --green-dim: #1a7a08;
      --green-mid: #27c40a;
      --amber:     #ffb700;
      --red:       #ff4444;
      --cyan:      #00e5ff;
      --white:     #d4e8d4;
      --muted:     #4a6b4a;
      --font-mono: 'Share Tech Mono', monospace;
      --font-big:  'VT323', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 998;
    }

    /* ── HEADER ── */
    #header {
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      background: var(--bg2);
      flex-shrink: 0;
    }

    #header h1 {
      font-family: var(--font-big);
      font-size: 28px;
      color: var(--green);
      text-shadow: 0 0 12px var(--green);
      letter-spacing: 2px;
    }

    #header .subtitle {
      color: var(--muted);
      font-size: 12px;
    }

    #header .player-count {
      margin-left: auto;
      color: var(--green-mid);
      font-size: 12px;
    }

    /* ── MAIN LAYOUT ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDE PANEL ── */
    #side {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg2);
    }

    .panel-title {
      font-family: var(--font-big);
      font-size: 18px;
      color: var(--green-mid);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      text-shadow: 0 0 8px var(--green-mid);
    }

    #room-desc {
      padding: 12px;
      color: var(--white);
      font-size: 12px;
      line-height: 1.6;
      border-bottom: 1px solid var(--border);
    }

    #player-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .player-entry {
      padding: 4px 12px;
      color: var(--green);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .player-entry::before {
      content: '▸';
      color: var(--green-dim);
      font-size: 10px;
    }

    .player-entry.you {
      color: var(--cyan);
    }

    .player-entry.you::before {
      content: '★';
      color: var(--cyan);
    }

    /* ── TERMINAL AREA ── */
    #terminal-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      scroll-behavior: smooth;
    }

    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: var(--bg); }
    #output::-webkit-scrollbar-thumb { background: var(--green-dim); }

    .msg {
      line-height: 1.5;
      margin-bottom: 2px;
      animation: fadein 0.15s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .msg .ts {
      color: var(--muted);
      font-size: 11px;
      margin-right: 6px;
      user-select: none;
    }

    .msg.say   .name { color: var(--green); }
    .msg.say   .body { color: var(--white); }
    .msg.emote .body { color: var(--amber); font-style: italic; }
    .msg.system .body { color: var(--green-mid); }
    .msg.join  .body { color: var(--cyan); }
    .msg.leave .body { color: var(--red); }
    .msg.look  .body { color: var(--white); opacity: 0.8; }
    .msg.error .body { color: var(--red); }
    .msg.you   .name { color: var(--cyan); }

    /* ── INPUT ── */
    #input-row {
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 8px 12px;
      gap: 8px;
      background: var(--bg2);
      flex-shrink: 0;
    }

    #prompt-label {
      color: var(--green-mid);
      font-size: 16px;
      user-select: none;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 14px;
      caret-color: var(--green);
    }

    #cmd-input::placeholder { color: var(--muted); }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 24px;
    }

    #login-screen h1 {
      font-family: var(--font-big);
      font-size: 64px;
      color: var(--green);
      text-shadow: 0 0 30px var(--green), 0 0 60px var(--green-dim);
      letter-spacing: 4px;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96%           { opacity: 0.7; }
      97%           { opacity: 1; }
      98%           { opacity: 0.6; }
    }

    #login-screen p {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      max-width: 360px;
      line-height: 1.6;
    }

    #login-box {
      display: flex;
      align-items: center;
      border: 1px solid var(--green-dim);
      padding: 8px 12px;
      gap: 8px;
      background: var(--bg2);
      box-shadow: 0 0 16px rgba(57,255,20,0.1);
    }

    #login-box span {
      color: var(--green-mid);
    }

    #name-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 14px;
      width: 200px;
      caret-color: var(--green);
    }

    #login-hint {
      color: var(--muted);
      font-size: 12px;
    }

    #login-error {
      color: var(--red);
      font-size: 12px;
      min-height: 16px;
    }

    /* ── HELP BAR ── */
    #help-bar {
      border-top: 1px solid var(--border);
      padding: 4px 16px;
      color: var(--muted);
      font-size: 11px;
      background: var(--bg);
      flex-shrink: 0;
      display: flex;
      gap: 16px;
    }

    #help-bar span { color: var(--green-dim); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>THE CROSSROADS</h1>
  <p>A lone room at the edge of nowhere. Enter your name to begin.</p>
  <div id="login-box">
    <span>ENTER NAME &gt;</span>
    <input id="name-input" type="text" maxlength="24" placeholder="traveller" autocomplete="off" autofocus />
  </div>
  <div id="login-error"></div>
  <div id="login-hint">Press ENTER to connect</div>
</div>

<!-- GAME UI -->
<div id="header">
  <h1>THE CROSSROADS</h1>
  <span class="subtitle">// a MUD with one room</span>
  <span class="player-count" id="player-count">● 0 present</span>
</div>

<div id="main">
  <div id="side">
    <div class="panel-title">THE ROOM</div>
    <div id="room-desc">Loading...</div>
    <div class="panel-title">PRESENT</div>
    <div id="player-list"></div>
  </div>

  <div id="terminal-wrap">
    <div id="output"></div>

    <div id="input-row">
      <span id="prompt-label">&gt;</span>
      <input id="cmd-input" type="text" placeholder="say hello  |  look  |  emote waves  |  help" autocomplete="off" disabled />
    </div>

    <div id="help-bar">
      <span>COMMANDS:</span>
      say &lt;msg&gt; &nbsp;|&nbsp;
      emote &lt;action&gt; &nbsp;|&nbsp;
      look &nbsp;|&nbsp;
      who &nbsp;|&nbsp;
      quit
    </div>
  </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/mud.js"></script>
</body>
</html>
